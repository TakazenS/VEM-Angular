<div class="dashboard-container">
  @if (user()) {
    <header class="dashboard-header">
      <div class="welcome-text">
        <h1>Bonjour, <span>{{ user().name }} {{ user().prenom }}</span></h1>
      </div>
      <button class="btn-logout" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        DÉCONNEXION
      </button>
    </header>

    <!-- @if (user().role === 'directeur' || user().role === 'administrateur' || user().role === 'logistique') -->
    <main class="dashboard-content">
      <div class="cards-grid">
        <div class="action-card">
          <div class="card-icon">
            <img src="/news.svg" height="45" width="45" alt="news-img">
          </div>
          <h2>Actualitées</h2>
          <p>Gérez les dernières publications.</p>
          <button class="btn-card" (click)="getNewsPage()">VOIR PLUS</button>
        </div>

        <div class="action-card">
          <div class="card-icon">
            <img src="/contact.svg" height="45" width="45" alt="contact-img">
          </div>
          <h2>Demandes de contact</h2>
          <p>Consultez les messages envoyés.</p>
          <button class="btn-card" (click)="getContactPage()">VOIR PLUS</button>
        </div>
      </div>
    </main>
  } @else {
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Chargement de votre session...</p>
    </div>
  }
</div>
